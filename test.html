<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Power Knowledge Hub - Trắc nghiệm</title>
  <style>
    :root {
      --primary: #1a3c5e;
      --primary-light: #2c5f8a;
      --accent: #e8751a;
      --bg: #f5f6f8;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 12px;
      --transition: 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
    .header { background:var(--primary); color:#fff; padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
    .logo { display:flex; align-items:center; gap:12px; cursor:pointer; }
    .logo-icon { width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; }
    .logo-text { font-weight:700; font-size:1.1rem; }
    .logo-text span { color:#fbbf24; font-size:0.78rem; display:block; opacity:0.9; }
    .header-nav { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
    .header-nav a { color:#cbd5e1; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:0.9rem; font-weight:500; white-space:nowrap; transition:var(--transition); }
    .header-nav a:hover, .header-nav a.active { background:rgba(255,255,255,0.12); color:#fff; }
    .mobile-toggle { display:none; background:none; border:none; color:#fff; font-size:1.6rem; cursor:pointer; }
    @media (max-width:900px) {
      .header-nav { display:none; position:absolute; top:64px; left:0; right:0; background:var(--primary); flex-direction:column; padding:12px; z-index:999; }
      .header-nav.open { display:flex; }
      .mobile-toggle { display:block; }
    }
    .main-container { flex:1; max-width:1400px; margin:0 auto; width:100%; padding:20px 24px 40px; }
    .hero { background:linear-gradient(135deg, #1a3c5e, #1e4d7a); border-radius:var(--radius); padding:28px; margin-bottom:28px; color:#fff; text-align:center; }
    .search-box { display:flex; max-width:650px; margin:0 auto; gap:8px; }
    .search-box input { flex:1; padding:13px 18px; border-radius:28px; border:2px solid transparent; font-size:1rem; }
    .search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(232,117,26,0.2); }
    .search-box button { padding:13px 24px; border-radius:28px; border:none; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
    .pills { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; justify-content:center; }
    .pill { padding:10px 20px; border-radius:24px; background:var(--card-bg); border:1.5px solid var(--border); cursor:pointer; font-weight:500; font-size:0.9rem; transition:var(--transition); }
    .pill.active { background:var(--primary-light); color:#fff; border-color:var(--primary-light); }
    .section-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
    .section-title h3 { font-size:1.2rem; color:var(--primary); }
    .badge { background:var(--accent); color:#fff; padding:4px 12px; border-radius:20px; font-size:0.78rem; }
    .doc-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:16px; margin-bottom:32px; }
    .doc-card { background:var(--card-bg); border-radius:var(--radius); padding:20px; border:1px solid var(--border); cursor:pointer; transition:var(--transition); position:relative; box-shadow:var(--shadow-sm); }
    .doc-card:hover { box-shadow:var(--shadow); transform:translateY(-3px); }
    .file-icon { width:44px; height:44px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:700; background:#fef2f2; color:#dc2626; }
    .btn-sm { padding:6px 14px; border-radius:16px; font-size:0.8rem; font-weight:500; cursor:pointer; border:1.5px solid transparent; transition:var(--transition); display:inline-flex; align-items:center; gap:4px; }
    .btn-primary { background:var(--primary-light); color:#fff; border-color:var(--primary-light); }
    .btn-outline { background:#fff; color:var(--primary-light); border-color:var(--border); }
    .btn-success { background:var(--success); color:#fff; border-color:var(--success); }
    .btn-danger { background:var(--danger); color:#fff; border-color:var(--danger); }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:2000; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.active { display:flex; }
    .modal { background:#fff; border-radius:var(--radius); width:100%; max-width:750px; max-height:90vh; overflow-y:auto; padding:28px; position:relative; }
    .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; font-size:1.6rem; cursor:pointer; }
    .ai-section { background:#f0fdf4; border-left:4px solid var(--success); padding:16px; margin:16px 0; border-radius:8px; }
    .essay-card { background:var(--card-bg); border-radius:var(--radius); padding:20px; border:1px solid var(--border); margin-bottom:16px; cursor:pointer; }
    .tab-bar { display:flex; gap:4px; border-bottom:2px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
    .tab { padding:10px 20px; cursor:pointer; font-weight:500; border:none; background:none; color:var(--text-secondary); border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab.active { color:var(--primary); border-bottom-color:var(--accent); }
    .admin-table { width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); overflow:hidden; }
    .admin-table th, .admin-table td { padding:12px 16px; text-align:left; border-bottom:1px solid var(--border); }
    .toast { position:fixed; bottom:24px; right:24px; background:#1f2937; color:#fff; padding:12px 20px; border-radius:24px; z-index:3000; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

    /* Quiz styles */
    .quiz-container {
      background-color: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      max-width: 100%;
    }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .quiz-header h2 {
      font-size: 1.5rem;
      color: var(--primary);
    }
    .question-item {
      background: #f9fafb;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
      border-left: 4px solid var(--primary-light);
      transition: 0.2s;
    }
    .question-item.correct {
      border-left-color: var(--success);
      background: #ecfdf5;
    }
    .question-item.wrong {
      border-left-color: var(--danger);
      background: #fef2f2;
    }
    .question-item .q-header {
      display: flex;
      gap: 8px;
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }
    .question-item .q-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-left: 8px;
      font-weight: normal;
    }
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 8px;
    }
    .options-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 4px 0;
    }
    .options-group input[type="radio"], .options-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .answer-indicator {
      font-size: 0.85rem;
      margin-left: 8px;
      font-weight: 500;
    }
    .answer-indicator.correct { color: var(--success); }
    .answer-indicator.wrong { color: var(--danger); }
    .quiz-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      justify-content: center;
    }
    .quiz-result {
      background: #f0fdf4;
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }
    .quiz-result .score {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    .quiz-result .detail {
      font-size: 1.1rem;
      margin-top: 8px;
    }
    .quiz-progress {
      background: var(--border);
      height: 6px;
      border-radius: 3px;
      margin: 12px 0 20px;
      overflow: hidden;
    }
    .quiz-progress .bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }
    @media (max-width: 700px) {
      .question-item { padding: 12px; }
      .options-group label { font-size: 0.9rem; }
      .quiz-header h2 { font-size: 1.2rem; }
    }
  </style>

    // Hàm parse CSV thành mảng câu hỏi
    function parseQuestions(csv) {
      const lines = csv.split('\n').filter(line => line.trim() !== '');
      const questions = [];
      for (let line of lines) {
        const cols = line.split('\t');
        if (cols.length < 9) continue;
        const content = cols[4];
        const answerStr = cols[5];
        const options = [];
        for (let i = 8; i < cols.length; i++) {
          if (cols[i] && cols[i].trim() !== '') options.push(cols[i].trim());
        }
        let correct = [];
        if (answerStr.includes(',')) {
          correct = answerStr.split(',').map(s => parseInt(s.trim()));
        } else {
          correct = [parseInt(answerStr)];
        }
        if (correct.some(isNaN)) continue;
        // Chuẩn hóa độ khó
        let difficulty = (cols[7] || '').toLowerCase();
        if (difficulty === 'easy' || difficulty === 'e') difficulty = 'Easy';
        else if (difficulty === 'medium' || difficulty === 'm') difficulty = 'Medium';
        else if (difficulty === 'hard' || difficulty === 'h') difficulty = 'Hard';
        else difficulty = 'Medium';
        questions.push({
          question: content,
          options: options,
          correct: correct,
          category: cols[1] || '',
          level: cols[2] || '',
          difficulty: difficulty
        });
      }
      return questions;
    }

    // Hàm tạo đề thi 50 câu theo tỉ lệ Easy: 30%, Medium: 40%, Hard: 30%
    function generateExam() {
      const easyPool = allQuestions.filter(q => q.difficulty === 'Easy');
      const mediumPool = allQuestions.filter(q => q.difficulty === 'Medium');
      const hardPool = allQuestions.filter(q => q.difficulty === 'Hard');
      
      // Hàm lấy ngẫu nhiên n phần tử từ mảng, nếu không đủ thì lấy tất cả
      function pickRandom(arr, n) {
        const shuffled = arr.slice().sort(() => Math.random() - 0.5);
        return shuffled.slice(0, Math.min(n, shuffled.length));
      }

      let easyPick = pickRandom(easyPool, 15);
      let mediumPick = pickRandom(mediumPool, 20);
      let hardPick = pickRandom(hardPool, 15);

      // Nếu thiếu, bổ sung từ các pool khác
      let exam = [...easyPick, ...mediumPick, ...hardPick];
      while (exam.length < 50) {
        // Lấy từ tất cả các câu hỏi chưa có trong exam
        const remaining = allQuestions.filter(q => !exam.includes(q));
        if (remaining.length === 0) break;
        const add = pickRandom(remaining, 50 - exam.length);
        exam = exam.concat(add);
      }
      // Trộn thứ tự
      exam = exam.sort(() => Math.random() - 0.5);
      return exam.slice(0, 50);
    }

        <div class="hero">
          <h2>🔍 Tra cứu tài liệu nhiệt điện thông minh</h2>
          <p>Tìm SOP, Manual, Alarm, Trip, P&ID...</p>
          <div class="search-box">
            <input id="heroSearch" placeholder="Nhập từ khóa..." onkeydown="if(event.key==='Enter') document.querySelector('[data-action=searchSubmit]').click()">
            <button data-action="searchSubmit">🔍 Tìm</button>
          </div>
        </div>
        <div class="pills">${categories.map(c=>`<div class="pill" data-action="setCategory" data-cat="${c.name}">${c.emoji} ${c.name}</div>`).join('')}</div>
        <div class="section-title"><h3>⭐ Mới cập nhật</h3><span class="badge">${documents.length} tài liệu</span></div>
        <div class="doc-grid">${recent.map(getDocCard).join('')}</div>
        <div class="section-title"><h3>🔥 Phổ biến nhất</h3></div>
        <div class="doc-grid">${popular.map(getDocCard).join('')}</div>
        <div style="text-align:center;margin-top:16px;"><button class="btn-sm btn-primary" data-action="navigate" data-page="docs" style="padding:10px 28px;">📚 Toàn bộ kho tài liệu</button></div>
      `;
    }

    function renderDocs() {
      let docs = documents.filter(d => !activeCategory || d.category === activeCategory);
      if (activeCategory && activeDocTab !== 'all') docs = docs.filter(d => d.subcategory === activeDocTab);
      const cat = categories.find(c => c.name === activeCategory);
      return `
        <div class="section-title"><h3>📚 Kho tài liệu ${activeCategory || 'Tất cả'}</h3>${activeCategory?`<button class="btn-sm btn-outline" data-action="clearCategory">✕ Xóa lọc</button>`:''}</div>
        <div class="pills">${categories.map(c=>`<div class="pill ${activeCategory===c.name?'active':''}" data-action="setCategory" data-cat="${c.name}">${c.emoji} ${c.name}</div>`).join('')}</div>
        ${cat ? `<div class="tab-bar"><button class="tab ${activeDocTab==='all'?'active':''}" data-action="setDocTab" data-tab="all">Tất cả</button>${cat.subs.map(s=>`<button class="tab ${activeDocTab===s?'active':''}" data-action="setDocTab" data-tab="${s}">${s}</button>`).join('')}</div>` : ''}
        ${docs.length ? `<div class="doc-grid">${docs.map(getDocCard).join('')}</div>` : '<div style="text-align:center;padding:40px;">📭 Không có tài liệu nào.</div>'}
      `;
    }

    function renderSearch() {
      let results = [];
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        results = documents.filter(d => d.title.toLowerCase().includes(q) || d.keywords.some(k=>k.toLowerCase().includes(q)) || d.tags.some(t=>t.toLowerCase().includes(q)) || d.category.toLowerCase().includes(q));
      }
      return `
        <div class="hero" style="padding:20px;"><h2>🔍 Tìm kiếm nâng cao</h2>
          <div class="search-box"><input id="searchInput" value="${searchQuery}" onkeydown="if(event.key==='Enter') document.querySelector('[data-action=searchSubmit]').click()"><button data-action="searchSubmit">🔍 Tìm</button></div>
        </div>
        ${searchQuery.trim() ? `<div class="section-title"><h3>Kết quả cho "${searchQuery}"</h3><span class="badge">${results.length} tài liệu</span></div>${results.length ? `<div class="doc-grid">${results.map(getDocCard).join('')}</div>` : '<div style="text-align:center;padding:40px;">🔎 Không tìm thấy.</div>'}` : '<div style="text-align:center;padding:40px;">⌨️ Nhập từ khóa để tìm kiếm.</div>'}
      `;
    }

    function renderEssay() {
      return `
        <div class="section-title"><h3>✍ Kiểm tra viết - Tự luận</h3><span class="badge">${essays.length} đề</span></div>
        ${essays.map(e=>`
          <div class="essay-card" data-action="essayDetail" data-id="${e.id}">
            <div style="display:flex;justify-content:space-between;"><span style="background:var(--primary-light);color:#fff;padding:4px 12px;border-radius:14px;font-size:0.75rem;">${e.topic}</span><span>👤 ${e.level}</span></div>
            <strong>${e.title}</strong>
            <p style="font-size:0.85rem;color:var(--text-secondary);">📋 ${e.rubric.substring(0,100)}...</p>
          </div>
        `).join('')}
      `;
    }

    // ---------- QUIZ RENDERER (thiết kế mới) ----------
    function renderQuiz() {
      // Nếu chưa có đề, tạo mới
      if (currentExam.length === 0) {
        resetExam();
        return;
      }

      let html = `
        <div class="quiz-container">
          <div class="quiz-header">
            <h2>📝 Bài thi trắc nghiệm</h2>
            <div>
              <span class="badge">${currentExam.length} câu</span>
              <span class="badge" style="background:var(--success);">Easy: 30% | Medium: 40% | Hard: 30%</span>
            </div>
          </div>
          <div style="margin-bottom:8px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span>Trạng thái: ${examSubmitted ? '✅ Đã nộp bài' : '⏳ Đang làm'}</span>
            <span>Đã trả lời: ${userAnswers.filter(a => a.length > 0).length}/${currentExam.length}</span>
          </div>
          <div class="quiz-progress"><div class="bar" style="width:${(userAnswers.filter(a => a.length > 0).length / currentExam.length * 100)}%;"></div></div>
      `;

      // Nếu đã nộp bài, hiển thị kết quả
      if (examSubmitted && examResult) {
        html += `
          <div class="quiz-result">
            <div class="score">${examResult.score} / 10</div>
            <div class="detail">✅ Đúng: ${examResult.correctCount} / ${examResult.total} câu</div>
            <div class="detail">❌ Sai: ${examResult.total - examResult.correctCount} câu</div>
          </div>
        `;
        // Hiển thị từng câu với đánh dấu đúng/sai
        currentExam.forEach((q, idx) => {
          const userAns = userAnswers[idx] || [];
          const isCorrect = examResult.details[idx];
          const correctIndices = q.correct.map(c => c - 1); // chuyển về index 0-based
          html += `
            <div class="question-item ${isCorrect ? 'correct' : 'wrong'}">
              <div class="q-header">
                <span>${idx+1}.</span>
                <span>${q.question}</span>
                <span class="q-meta">${q.difficulty} | ${q.category}</span>
                <span class="answer-indicator ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Đúng' : '✗ Sai'}</span>
              </div>
              <div class="options-group">
          `;
          q.options.forEach((opt, oi) => {
            const checked = userAns.includes(oi);
            const isCorrectOpt = correctIndices.includes(oi);
            let style = '';
            if (isCorrectOpt) style += 'color: var(--success); font-weight: bold;';
            if (checked && !isCorrectOpt) style += 'color: var(--danger); text-decoration: line-through;';
            html += `
              <label style="${style}">
                <input type="${q.correct.length > 1 ? 'checkbox' : 'radio'}" disabled ${checked ? 'checked' : ''}>
                ${opt}
                ${isCorrectOpt ? ' ✅' : ''}
                ${checked && !isCorrectOpt ? ' ❌' : ''}
              </label>
            `;
          });
          html += `</div></div>`;
        });
        html += `
          <div class="quiz-actions">
            <button class="btn btn-primary" data-action="resetQuiz">🔄 Tạo đề mới</button>
          </div>
        `;
      } else {
        // Chưa nộp bài: hiển thị các câu hỏi để làm
        currentExam.forEach((q, idx) => {
          const userAns = userAnswers[idx] || [];
          const isMulti = q.correct.length > 1;
          html += `
            <div class="question-item">
              <div class="q-header">
                <span>${idx+1}.</span>
                <span>${q.question}</span>
                <span class="q-meta">${q.difficulty} | ${q.category}</span>
              </div>
              <div class="options-group" data-qidx="${idx}">
          `;
          q.options.forEach((opt, oi) => {
            const checked = userAns.includes(oi);
            html += `
              <label>
                <input type="${isMulti ? 'checkbox' : 'radio'}" name="q${idx}" value="${oi}" ${checked ? 'checked' : ''} data-action="quizAnswer" data-qidx="${idx}" data-oidx="${oi}">
                ${opt}
              </label>
            `;
          });
          html += `</div></div>`;
        });
        html += `
          <div class="quiz-actions">
            <button class="btn btn-success" data-action="submitExam">📨 Nộp bài</button>
            <button class="btn btn-primary" data-action="resetQuiz">🔄 Tạo đề mới</button>
          </div>
        `;
      }

      html += `</div>`;
      return html;
    }

    function renderProfile() {
      const favDocs = documents.filter(d => favorites.includes(d.id));
      return `
        <div class="section-title"><h3>👤 Hồ sơ</h3></div>
        <div style="display:flex;gap:20px;align-items:center;margin-bottom:24px;"><div style="width:72px;height:72px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;">U</div><div><h4>User</h4><p>user@thermalpower.vn</p></div></div>
        <div class="section-title"><h3>⭐ Yêu thích (${favDocs.length})</h3></div>
        ${favDocs.length ? `<div class="doc-grid">${favDocs.map(getDocCard).join('')}</div>` : '<div style="text-align:center;padding:40px;">☆ Chưa có tài liệu yêu thích.</div>'}
      `;
    }

    function renderAdmin() {
      let tabContent = '';
      if (adminTab === 'docs') {
        tabContent = `
          <table class="admin-table"><tr><th>ID</th><th>Tên</th><th>Danh mục</th><th>AI</th><th>Ngày</th><th>Hành động</th></tr>
          ${documents.map(d=>`<tr><td>#${d.id}</td><td>${d.title.substring(0,40)}...</td><td>${d.category}</td><td><span style="display:inline-block;width:8px;height:8px;background:#10b981;border-radius:50%;margin-right:6px;"></span>Đã phân tích</td><td>${d.date}</td><td><button class="btn-sm btn-outline" data-action="docDetail" data-id="${d.id}">✏️</button></td></tr>`).join('')}
          </table>
          <div style="text-align:center;margin-top:16px;"><button class="btn-sm btn-primary" data-action="syncDrive">🔄 Đồng bộ Google Drive ngay</button></div>`;
      } else if (adminTab === 'sync') {
        tabContent = `<div style="background:#fff;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);"><h4>🔄 Đồng bộ Google Drive</h4><p>Trạng thái: ✅ Kết nối</p><p>Lần đồng bộ cuối: 2026-07-02 08:30</p><button class="btn-sm btn-primary" data-action="syncDrive">🔄 Đồng bộ thủ công</button></div>`;
      } else if (adminTab === 'stats') {
        tabContent = `<div style="background:#fff;border-radius:12px;padding:24px;box-shadow:var(--shadow-sm);"><h4>📊 Thống kê</h4><p>👥 Người dùng: 15 | 📄 Tài liệu: ${documents.length} | 🔍 Tìm kiếm: 42</p></div>`;
      }
      return `
        <div class="section-title"><h3>⚙️ Quản trị</h3></div>
        <div class="tab-bar">
          <button class="tab ${adminTab==='docs'?'active':''}" data-action="adminTab" data-tab="docs">📋 Tài liệu</button>
          <button class="tab ${adminTab==='sync'?'active':''}" data-action="adminTab" data-tab="sync">🔄 Đồng bộ</button>
          <button class="tab ${adminTab==='stats'?'active':''}" data-action="adminTab" data-tab="stats">📊 Thống kê</button>
        </div>
        ${tabContent}`;
    }

    // ---------- ROUTER ----------
    function render(page) {
      const container = document.getElementById('mainContent');
      switch(page) {
        case 'home': container.innerHTML = renderHome(); break;
        case 'docs': container.innerHTML = renderDocs(); break;
        case 'search': container.innerHTML = renderSearch(); break;
        case 'essay': container.innerHTML = renderEssay(); break;
        case 'quiz': container.innerHTML = renderQuiz(); break;
        case 'profile': container.innerHTML = renderProfile(); break;
        case 'admin': container.innerHTML = renderAdmin(); break;
      }
      document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));
      const nav = document.querySelector(`.header-nav a[data-page="${page}"]`);
      if (nav) nav.classList.add('active');
    }

    // ---------- EVENT HANDLING ----------
    document.addEventListener('click', function(e) {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const action = target.dataset.action;
      const id = target.dataset.id;
      const page = target.dataset.page;
      const cat = target.dataset.cat;
      const tab = target.dataset.tab;

      if (target.tagName === 'A' && action) e.preventDefault();

      switch(action) {
        case 'navigate':
          if (page) {
            currentPage = page;
            if (page === 'quiz') {
              // Nếu chưa có đề, tạo mới
              if (currentExam.length === 0) resetExam();
            }
            render(page);
            window.location.hash = page;
          }
          break;
        case 'toggleMenu': document.getElementById('headerNav').classList.toggle('open'); break;
        case 'setCategory': activeCategory = cat; activeDocTab = 'all'; currentPage = 'docs'; render('docs'); window.location.hash = 'docs'; break;
        case 'clearCategory': activeCategory = null; activeDocTab = 'all'; render('docs'); break;
        case 'setDocTab': activeDocTab = tab; render('docs'); break;
        case 'docDetail': showDocDetail(Number(id)); break;
        case 'essayDetail': showEssayDetail(Number(id)); break;
        case 'toggleFav': toggleFavorite(Number(id)); break;
        case 'download': downloadDoc(Number(id)); break;
        case 'searchSubmit':
          const input = document.getElementById('searchInput') || document.getElementById('heroSearch');
          if (input) searchQuery = input.value;
          currentPage = 'search'; render('search'); window.location.hash = 'search';
          break;
        case 'resetQuiz':
          resetExam();
          break;
        case 'submitExam':
          submitExam();
          break;
        case 'adminTab': adminTab = tab; render('admin'); break;
        case 'syncDrive': showToast('🔄 Đang đồng bộ... (mô phỏng)'); setTimeout(() => showToast('✅ Hoàn tất!'), 1500); break;
        default: break;
      }
    });

    // Xử lý sự kiện thay đổi đáp án (cho radio/checkbox)
    document.addEventListener('change', function(e) {
      const target = e.target.closest('[data-action="quizAnswer"]');
      if (!target) return;
      if (examSubmitted) return;
      const qidx = parseInt(target.dataset.qidx);
      const oidx = parseInt(target.dataset.oidx);
      if (isNaN(qidx) || isNaN(oidx)) return;

      const isMulti = currentExam[qidx].correct.length > 1;
      if (isMulti) {
        // checkbox: toggle
        const idx = userAnswers[qidx].indexOf(oidx);
        if (idx > -1) {
          userAnswers[qidx].splice(idx, 1);
        } else {
          userAnswers[qidx].push(oidx);
        }
      } else {
        // radio: chỉ chọn 1
        userAnswers[qidx] = [oidx];
      }
      // Cập nhật lại giao diện (re-render quiz) để hiển thị trạng thái đã chọn
      render('quiz');
    });

    // Hàm nộp bài
    function submitExam() {
      if (examSubmitted) return;
      // Kiểm tra xem đã trả lời hết chưa? Nếu chưa, vẫn cho nộp nhưng cảnh báo
      const unanswered = userAnswers.filter(a => a.length === 0).length;
      if (unanswered > 0) {
        if (!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Bạn có chắc muốn nộp bài?`)) {
          return;
        }
      }
      // Tính điểm
      let correctCount = 0;
      const details = [];
      currentExam.forEach((q, idx) => {
        const userAns = userAnswers[idx] || [];
        // Chuyển đáp án đúng từ 1-based sang 0-based
        const correctIndices = q.correct.map(c => c - 1).sort();
        const sortedUser = userAns.slice().sort();
        const isCorrect = JSON.stringify(sortedUser) === JSON.stringify(correctIndices);
        if (isCorrect) correctCount++;
        details.push(isCorrect);
      });
      const total = currentExam.length;
      const score = ((correctCount / total) * 10).toFixed(1);
      examResult = { correctCount, total, score, details };
      examSubmitted = true;
      render('quiz');
      showToast(`📊 Bạn đạt ${score}/10 điểm (${correctCount}/${total} câu đúng)`);
    }

    // Modal handlers
    function showDocDetail(id) {
      const doc = documents.find(d => d.id === id);
      if (!doc) return;
      const related = (doc.related||[]).map(rid => documents.find(d => d.id === rid)).filter(Boolean);
      document.getElementById('modalContent').innerHTML = `
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>${doc.title}</h3>
        <p>🏷️ ${doc.category}/${doc.subcategory} | ${doc.brand} | v${doc.version}</p>
        <p>📄 ${doc.pages} trang | 📦 ${doc.size} | ⭐ ${'★'.repeat(doc.rating)}</p>
        <div class="ai-section"><h4>🤖 AI Summary</h4><p>${doc.summary}</p></div>
        <p><strong>Từ khóa:</strong> ${doc.keywords.join(', ')}</p>
        ${doc.devices.length ? `<p><strong>Thiết bị:</strong> ${doc.devices.join(', ')}</p>` : ''}
        ${related.length ? `<p><strong>Liên quan:</strong></p><div style="display:flex;gap:8px;">${related.map(r=>`<span style="cursor:pointer;color:#2563eb;" onclick="document.getElementById('modalOverlay').classList.remove('active');showDocDetail(${r.id})">${r.title.substring(0,30)}...</span>`).join('')}</div>` : ''}
        <div style="margin-top:16px;display:flex;gap:10px;">
          <button class="btn-sm btn-primary" onclick="downloadDoc(${doc.id})">⬇ Tải xuống</button>
          <button class="btn-sm btn-outline" onclick="previewDoc(${doc.id})">👁 Xem trước</button>
        </div>`;
      document.getElementById('modalOverlay').classList.add('active');
    }
    window.showDocDetail = showDocDetail;

    function showEssayDetail(id) {
      const essay = essays.find(e => e.id === id);
      if (!essay) return;
      const refs = (essay.refs||[]).map(rid => documents.find(d => d.id === rid)).filter(Boolean);
      document.getElementById('modalContent').innerHTML = `
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>${essay.title}</h3>
        <p>📚 ${essay.topic} | 👤 ${essay.level}</p>
        <div style="background:#fefce8;padding:14px;margin:12px 0;"><strong>Rubric:</strong> ${essay.rubric}</div>
        <div style="background:#f0fdf4;padding:14px;"><strong>Đáp án mẫu:</strong> ${essay.answer}</div>
        ${refs.length ? `<p style="margin-top:12px;"><strong>Tài liệu tham khảo:</strong> ${refs.map(r=>`<span style="cursor:pointer;color:#2563eb;" onclick="document.getElementById('modalOverlay').classList.remove('active');showDocDetail(${r.id})">${r.title.substring(0,30)}</span>`).join(', ')}</p>` : ''}
      `;
      document.getElementById('modalOverlay').classList.add('active');
    }
    window.showEssayDetail = showEssayDetail;

    function previewDoc(id) {
      const doc = documents.find(d => d.id === id);
      document.getElementById('modalContent').innerHTML = `
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('active')">✕</button>
        <h3>👁 Xem trước: ${doc.title}</h3>
        <div style="height:300px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;border-radius:8px;margin:16px 0;">📄 Preview không khả dụng với dữ liệu mẫu.</div>`;
      document.getElementById('modalOverlay').classList.add('active');
    }
    window.previewDoc = previewDoc;

    function downloadDoc(id) {
      const doc = documents.find(d => d.id === id);
      if (doc) showToast(`⬇ Đang tải "${doc.title.substring(0,30)}..." (mô phỏng)`);
    }
    window.downloadDoc = downloadDoc;

    function toggleFavorite(id) {
      if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
      else favorites.push(id);
      localStorage.setItem('tpkh_fav', JSON.stringify(favorites));
      render(currentPage);
      showToast(favorites.includes(id) ? '⭐ Đã thêm yêu thích' : 'Đã bỏ yêu thích');
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });

    // ---------- INIT ----------
    const hash = window.location.hash.replace('#', '');
    const page = ['home','docs','search','essay','quiz','profile','admin'].includes(hash) ? hash : 'home';
    currentPage = page;
    // Nếu vào quiz, tạo đề ngay
    if (page === 'quiz') {
      resetExam();
    } else {
      render(page);
    }
  })();
</script>
</body>
</html>
